services:
  api-server:
    build: .
    ports:
      - "3340:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"] # หรือ endpoint ที่มีอยู่จริง
      interval: 5s
      timeout: 5s
      retries: 5

  robot_tester:
    build:
      context: ./tests
      dockerfile: Dockerfile.robot
    volumes:
      - ./tests:/tests
    depends_on:
      - api-server
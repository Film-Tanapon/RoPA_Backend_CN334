name: CI - Test & Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =========================================================
  # JOB 1: รัน Robot Framework Tests ด้วย Docker Compose
  # =========================================================
  robot-test:
    name: Robot Framework API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # สร้างไฟล์ .env จาก GitHub Secrets เพื่อให้ api-server ใช้ได้
      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env

      # Build และรัน api-server + robot_tester พร้อมกัน
      # --exit-code-from robot_tester = ให้ exit code ของ job ขึ้นกับ robot_tester
      # --abort-on-container-exit     = หยุด container อื่นทันทีเมื่อ robot_tester เสร็จ
      - name: Run tests with Docker Compose
        run: |
          docker compose up \
            --build \
            --exit-code-from robot_tester \
            --abort-on-container-exit

      # คัดลอก test results ออกมาจาก container ก่อนที่มันจะถูกลบ
      - name: Copy test results from container
        if: always()
        run: |
          CONTAINER=$(docker compose ps -q robot_tester 2>/dev/null || true)
          if [ -n "$CONTAINER" ]; then
            docker cp "$CONTAINER":/tests/results ./robot-results || true
          fi

      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down --volumes

      # Upload ผลลัพธ์ทดสอบขึ้น GitHub เพื่อดูย้อนหลังได้
      - name: Upload Robot Framework Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: robot-results/
          retention-days: 14

  # =========================================================
  # JOB 2: Deploy ไปยัง Render (รันต่อเมื่อ test ผ่านเท่านั้น)
  # =========================================================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: robot-test                      # รอให้ job robot-test ผ่านก่อน
    if: github.ref == 'refs/heads/main'    # deploy เฉพาะ push ไปที่ main เท่านั้น

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
